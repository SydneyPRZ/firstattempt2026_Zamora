<!DOCTYPE html>
<html lang="en-PH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>AlumniGive — Connect. Give. Impact.</title>
    <meta name="description" content="The official alumni donation and engagement platform. Give back, stay connected, make an impact." />
    <meta name="keywords" content="alumni, donation, scholarship, Philippines, give back, fundraising" />
    <meta name="author" content="AlumniGive" />
    <meta name="robots" content="index, follow" />

    <!-- PWA Essential -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AlumniGive" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AlumniGive" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Apple Splash Screens (portrait) -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#1e3a8a" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AlumniGive — Connect. Give. Impact." />
    <meta property="og:description" content="The official alumni donation and engagement platform." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:url" content="https://alumni-give.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AlumniGive" />
    <meta name="twitter:description" content="Give back, stay connected, make an impact." />
    <meta name="twitter:image" content="/icons/icon-192x192.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />

    <!-- Fonts: preconnect for performance, then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Immediate font fallback while Google Fonts loads -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <style>
      /* ── Critical CSS: inlined for zero-render-blocking ─────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue-50: #eff6ff;  --blue-100: #dbeafe; --blue-200: #bfdbfe;
        --blue-300: #93c5fd; --blue-400: #60a5fa; --blue-500: #3b82f6;
        --blue-600: #2563eb; --blue-700: #1d4ed8; --blue-800: #1e40af;
        --blue-900: #1e3a8a;
        --slate-50: #f8fafc;  --slate-100: #f1f5f9; --slate-200: #e2e8f0;
        --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
        --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b;
        --slate-900: #0f172a;
        --gold: #f59e0b; --gold-light: #fef3c7;
        --green: #10b981;  --green-light: #d1fae5;
        --red: #ef4444;    --red-light: #fee2e2;
        --radius-sm: 8px; --radius-md: 12px; --radius-lg: 20px; --radius-xl: 28px;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        --shadow-lg: 0 10px 30px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.05);
        --shadow-blue: 0 8px 24px rgba(37,99,235,0.25);
        --font-display: 'DM Serif Display', Georgia, serif;
        --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --nav-height: 72px;
        --top-bar-height: 60px;
        /* iOS safe areas */
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      html, body {
        height: 100%; height: 100dvh;
        font-family: var(--font-body);
        background: var(--slate-100);
        color: var(--slate-800);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overscroll-behavior: none;
      }
      body { overflow-x: hidden; }
      #app  { height: 100%; height: 100dvh; }

      /* App-shell skeleton shown immediately before LitElement boots */
      #app-skeleton {
        position: fixed; inset: 0;
        background: white;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #app-skeleton.hidden { opacity: 0; pointer-events: none; }
      .sk-logo {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 32px; color: #1d4ed8;
      }
      .sk-logo span { color: #f59e0b; }
      .sk-spinner {
        width: 36px; height: 36px;
        border: 3px solid #dbeafe;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .sk-tagline { font-size: 13px; color: #64748b; letter-spacing: 0.3px; }

      /* Tap highlight removal for mobile */
      * { -webkit-tap-highlight-color: transparent; }

      /* Smooth scrolling — respects prefers-reduced-motion */
      @media (prefers-reduced-motion: no-preference) {
        html { scroll-behavior: smooth; }
      }

      /* iOS notch padding for standalone mode */
      @media (display-mode: standalone) {
        body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
      }
    </style>
  </head>
  <body>
    <!-- Instant skeleton loader — hidden once LitElement renders -->
    <div id="app-skeleton" aria-hidden="true">
      <div class="sk-logo">Alumni<span>Give</span></div>
      <div class="sk-spinner"></div>
      <div class="sk-tagline">Connect · Give · Impact</div>
    </div>

    <!-- App root -->
    <div id="app">
      <app-root></app-root>
    </div>

    <!-- Main bundle — deferred so it never blocks render -->
    <script type="module" src="/src/main.js"></script>

    <!-- Hide skeleton once app shell is ready -->
    <script type="module">
      // Remove skeleton after first LitElement update cycle
      window.addEventListener('app-ready', () => {
        const sk = document.getElementById('app-skeleton');
        if (sk) { sk.classList.add('hidden'); setTimeout(() => sk.remove(), 500); }
      }, { once: true });
      // Fallback: remove after 3s regardless
      setTimeout(() => {
        const sk = document.getElementById('app-skeleton');
        if (sk) { sk.classList.add('hidden'); setTimeout(() => sk.remove(), 500); }
      }, 3000);
    </script>
  </body>
</html>
