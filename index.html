<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlumniGive — Connect. Give. Impact.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --blue-50: #eff6ff;
        --blue-100: #dbeafe;
        --blue-200: #bfdbfe;
        --blue-300: #93c5fd;
        --blue-400: #60a5fa;
        --blue-500: #3b82f6;
        --blue-600: #2563eb;
        --blue-700: #1d4ed8;
        --blue-800: #1e40af;
        --blue-900: #1e3a8a;
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --slate-900: #0f172a;
        --gold: #f59e0b;
        --gold-light: #fef3c7;
        --green: #10b981;
        --green-light: #d1fae5;
        --red: #ef4444;
        --red-light: #fee2e2;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        --shadow-lg: 0 10px 30px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.05);
        --shadow-blue: 0 8px 24px rgba(37,99,235,0.25);
        --font-display: 'DM Serif Display', serif;
        --font-body: 'Plus Jakarta Sans', sans-serif;
        --nav-height: 72px;
        --top-bar-height: 60px;
      }
      html, body {
        height: 100%;
        font-family: var(--font-body);
        background: var(--slate-100);
        color: var(--slate-800);
        -webkit-font-smoothing: antialiased;
      }
      body { overflow-x: hidden; }
      #app { height: 100%; }
    </style>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <app-root></app-root>
    </div>
  </body>
</html>
